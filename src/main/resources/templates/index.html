<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模拟面试器 - 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(12px, 3svh, 20px) clamp(16px, 4vw, 20px);
        }

        @supports (min-height: 100svh) {
            body {
                min-height: 100svh;
            }
        }

        @supports (min-height: 100dvh) {
            body {
                min-height: 100dvh;
            }
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: clamp(28px, 5.5svh, 60px) clamp(24px, 4vw, 40px);
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: clamp(30px, 4vw, 36px);
            margin-bottom: clamp(12px, 2svh, 20px);
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            font-size: clamp(16px, 2.1vw, 18px);
            margin-bottom: clamp(24px, 4svh, 40px);
            line-height: 1.5;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: clamp(16px, 3vw, 30px);
            margin-bottom: clamp(28px, 5svh, 50px);
        }

        .feature-item {
            padding: clamp(20px, 3.5svh, 30px) clamp(16px, 2.5vw, 20px);
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            transition: transform 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: clamp(38px, 5vw, 48px);
            margin-bottom: clamp(10px, 1.8svh, 15px);
        }

        .feature-title {
            font-size: clamp(16px, 2.2vw, 18px);
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .feature-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            padding: 15px 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .steps {
            text-align: left;
            margin-top: clamp(28px, 4svh, 40px);
            padding: clamp(22px, 3.5svh, 30px);
            background: #f8f9fa;
            border-radius: 15px;
        }

        .steps h3 {
            margin-bottom: clamp(14px, 2svh, 20px);
            color: #333;
        }

        .step {
            display: flex;
            align-items: center;
            margin-bottom: clamp(14px, 2.4svh, 20px);
        }

        .step:last-child {
            margin-bottom: 0;
        }

        .step-number {
            width: clamp(34px, 4.4svh, 40px);
            height: clamp(34px, 4.4svh, 40px);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: clamp(16px, 2.2svh, 18px);
            margin-right: clamp(14px, 2vw, 20px);
            flex-shrink: 0;
        }

        .step-text {
            color: #333;
            font-size: clamp(15px, 1.9vw, 16px);
        }

        @media (max-height: 950px) and (min-width: 768px) {
            body {
                align-items: flex-start;
            }

            .container {
                padding: 28px 28px;
            }

            .features {
                gap: 14px;
                margin-bottom: 24px;
            }

            .feature-item {
                padding: 18px 16px;
            }

            .feature-icon {
                font-size: 34px;
                margin-bottom: 8px;
            }

            .feature-title {
                margin-bottom: 6px;
            }

            .steps {
                margin-top: 24px;
                padding: 20px;
            }

            .step {
                margin-bottom: 12px;
            }
        }

        @media (max-height: 760px) and (min-width: 768px) {
            body {
                padding: 8px 16px;
            }

            .container {
                padding: 20px 24px;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 8px;
            }

            .subtitle {
                font-size: 15px;
                margin-bottom: 16px;
                line-height: 1.4;
            }

            .features {
                gap: 10px;
                margin-bottom: 16px;
            }

            .feature-item {
                padding: 14px 14px;
            }

            .feature-icon {
                font-size: 30px;
                margin-bottom: 6px;
            }

            .feature-title {
                font-size: 15px;
                margin-bottom: 4px;
            }

            .feature-desc {
                font-size: 13px;
                line-height: 1.4;
            }

            .btn {
                padding: 12px 40px;
                font-size: 17px;
            }

            .steps {
                margin-top: 16px;
                padding: 16px;
            }

            .steps h3 {
                margin-bottom: 10px;
            }

            .step {
                margin-bottom: 8px;
            }

            .step-number {
                width: 30px;
                height: 30px;
                font-size: 15px;
                margin-right: 12px;
            }

            .step-text {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 模拟面试器</h1>
        <p class="subtitle">AI 驱动的专业面试模拟平台<br>智能简历评分 + 个性化面试问题 + 深度答案评估</p>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">📄</div>
                <div class="feature-title">智能简历评分</div>
                <div class="feature-desc">多维度深度分析，提供专业改进建议</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🎤</div>
                <div class="feature-title">模拟面试</div>
                <div class="feature-desc">基于简历定制个性化面试问题</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📊</div>
                <div class="feature-title">答案评估</div>
                <div class="feature-desc">专业评分 + 详细反馈 + 参考答案</div>
            </div>
        </div>

        <a href="/upload" class="btn">开始面试准备</a>

        <div class="steps">
            <h3>使用流程</h3>
            <div class="step">
                <div class="step-number">1</div>
                <div class="step-text">上传简历 - AI 智能评分并提供优化建议</div>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <div class="step-text">查看分析 - 详细了解简历优势与不足</div>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <div class="step-text">模拟面试 - 回答针对性面试问题</div>
            </div>
            <div class="step">
                <div class="step-number">4</div>
                <div class="step-text">获得评估 - 查看专业评分和参考答案</div>
            </div>
        </div>
    </div>
</body>
</html>
